name: tcg_market_place
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.10.7


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  supabase_flutter: ^2.12.4
  flutter_dotenv: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
  
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/card.png"
  adaptive_icon_background: "#121212" 
  adaptive_icon_foreground: "assets/images/card.png" 